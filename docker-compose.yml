# ──────────────────────────────────────────────────────────────
# 주요 명령어
#
# 띄우기 (백그라운드 실행)
#   docker compose up -d
#
# 상태 / 로그 확인
#   docker compose ps
#   docker compose logs -f db
#
# 내리기 (컨테이너만 제거, 볼륨/데이터 유지)
#   docker compose down
#
# 내리기 + 볼륨까지 제거 (DB 데이터 전부 삭제)
#   docker compose down -v
#
# 이미지까지 재빌드해서 다시 띄우기
#   docker compose down -v
#   docker compose build --no-cache
#   docker compose up -d --build --force-recreate
# ──────────────────────────────────────────────────────────────

services:
  app:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/watermelon
      BLOB_STORAGE_URL: ${BLOB_STORAGE_URL:-}
      BLOB_STORAGE_ACCESS_KEY: ${BLOB_STORAGE_ACCESS_KEY:-}
      BLOB_CONTAINER_NAME: ${BLOB_CONTAINER_NAME:-data}
      BLOB_DATASET_BLOB: ${BLOB_DATASET_BLOB:-watermelon_dataset_targets.csv}
      PREDICTION_CRON_HOUR: ${PREDICTION_CRON_HOUR:-3}
      PREDICTION_CRON_MINUTE: ${PREDICTION_CRON_MINUTE:-0}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: watermelon
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
